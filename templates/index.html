<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmashHouse — Sistema de Pedidos</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<div class="view-switcher">
  <div class="switcher-brand">🍔 SmashHouse</div>
  <div class="switcher-tabs">
    <button class="sw-tab active" onclick="switchScreen('customer')">🛒 Fazer Pedido</button>
    <button class="sw-tab" onclick="switchScreen('dashboard')">⚙️ Gestão</button>
  </div>
  <div class="switcher-status">
    <div class="status-pill">
      <div class="pulse" id="top-pulse"></div>
      <span id="top-status-text">Aberto agora</span>
    </div>
  </div>
</div>

<div class="screen active" id="screen-customer">
  <div class="customer-header">
    <div class="header-inner">
      <div class="header-top">
        <div>
          <div class="brand-logo">Smash<span>House</span></div>
          <div class="brand-tag">Burgers & Co — Joinville, SC</div>
        </div>

        <button class="header-cart-btn" onclick="toggleCart()">
          <i class="fas fa-shopping-bag"></i>
          Carrinho
          <div class="cart-count-badge" id="cart-badge">0</div>
        </button>
      </div>

      <div class="cat-nav" id="customer-cat-nav">
        <button class="cat-btn active">Tudo</button>
      </div>
    </div>
  </div>

  <div class="menu-section" id="menu-section"></div>
</div>

<div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>

<div class="cart-drawer" id="cart-drawer">
  <div class="drawer-header">
    <div class="drawer-title">Seu Pedido</div>
    <button class="drawer-close" onclick="toggleCart()">
      <i class="fas fa-times"></i>
    </button>
  </div>

  <div class="drawer-items" id="drawer-items"></div>
</div>

<script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
